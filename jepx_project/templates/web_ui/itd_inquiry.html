{% extends 'base.html' %}
{% block title %}各種照会 - ITD{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'web_ui:itd_dashboard' %}" class="text-sm text-blue-600 hover:underline flex items-center mb-2">
        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        ダッシュボードへ戻る
    </a>
    <h1 class="text-2xl font-bold tracking-tight text-gray-900">時間前取引 (ITD) 各種照会・履歴</h1>
    <p class="mt-1 text-sm text-gray-500">ITD1003(入札照会)、ITD1004(約定照会)などから対象コマの全履歴を閲覧します。</p>
</div>

<div class="glass-panel p-6 rounded-xl mb-8">
    <form action="#" method="GET" class="flex flex-col sm:flex-row items-end gap-4">
        <div class="w-full sm:w-1/4">
            <label class="block text-sm font-medium text-gray-700 mb-1">対象受渡日</label>
            <input type="date" value="2026-04-02" class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm sm:text-sm">
        </div>
        <div class="w-full sm:w-1/4">
            <label class="block text-sm font-medium text-gray-700 mb-1">コマ</label>
            <select class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm sm:text-sm">
                <option value="24">24</option>
                <option value="25">25</option>
            </select>
        </div>
        <button type="button" class="w-full sm:w-1/4 btn-primary font-medium py-2 px-6 rounded-md shadow-sm text-sm">
            履歴照会 (ITD1004/ITD1003)
        </button>
    </form>
</div>

<div class="text-center text-gray-400 py-12">
    <svg class="mx-auto h-12 w-12 text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
    <p>条件を指定して照会を実行してください。</p>
</div>
{% endblock %}
