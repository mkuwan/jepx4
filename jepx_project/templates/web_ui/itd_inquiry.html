{% extends 'base.html' %}
{% block title %}各種照会 - ITD{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{% url 'web_ui:itd_dashboard' %}" class="text-decoration-none small text-primary d-inline-flex align-items-center gap-1 mb-2">
        <svg class="jepx-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        ダッシュボードへ戻る
    </a>
    <h1 class="h4 fw-bold text-dark mb-1">時間前取引 (ITD) 各種照会・履歴</h1>
    <p class="text-muted small mb-0">ITD1003(入札照会)、ITD1004(約定照会)などから対象コマの全履歴を閲覧します。</p>
</div>

<div class="glass-panel p-4 mb-4">
    <form action="#" method="GET" class="row g-2 align-items-end">
        <div class="col-sm-3">
            <label class="form-label small fw-medium mb-1">対象受渡日</label>
            <input type="date" value="2026-04-02" class="form-control form-control-sm">
        </div>
        <div class="col-sm-2">
            <label class="form-label small fw-medium mb-1">コマ</label>
            <select class="form-select form-select-sm">
                <option value="24">24</option>
                <option value="25">25</option>
            </select>
        </div>
        <div class="col-sm-auto">
            <button type="button" class="btn btn-primary btn-sm">
                履歴照会 (ITD1004/ITD1003)
            </button>
        </div>
    </form>
</div>

<div class="text-center text-muted py-5">
    <svg class="jepx-icon mb-3" style="width:3rem;height:3rem;color:#d1d5db;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
    <p class="small">条件を指定して照会を実行してください。</p>
</div>
{% endblock %}
