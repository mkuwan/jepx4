{% extends 'base.html' %}
{% block title %}CSV取込・検証 - DAH{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{% url 'web_ui:dah_dashboard' %}" class="text-decoration-none small text-primary d-inline-flex align-items-center gap-1 mb-2">
        <svg class="jepx-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        ダッシュボードへ戻る
    </a>
    <h1 class="h4 fw-bold text-dark mb-1">1. 取込・検証 (DAHファイルアップロード)</h1>
    <p class="text-muted small mb-0">SharePoint連携を使用せず、一時的にローカルファイルから計画値データをロードして検証します。</p>
</div>

<div class="row justify-content-center mt-3">
    <div class="col-lg-8">
        <div class="glass-panel p-4">
            <form action="#" method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="upload-zone mb-3">
                    <svg class="jepx-icon mb-3 text-primary" style="width:3rem;height:3rem;" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                        <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <div class="mb-1">
                        <label for="file-upload" class="text-primary fw-medium" style="cursor:pointer;">
                            ファイルを選択
                            <input id="file-upload" name="file-upload" type="file" class="d-none" accept=".csv,.xlsx">
                        </label>
                        <span class="text-muted"> またはドラッグ＆ドロップ</span>
                    </div>
                    <small class="text-muted">CSV, Excelファイル (最大 10MB)</small>
                </div>

                <div class="mb-3">
                    <label class="form-label small fw-medium">対象受渡日</label>
                    <input type="date" value="2026-04-02" class="form-control form-control-sm">
                </div>

                <button type="button" class="btn btn-primary w-100">
                    アップロードと検証を実行
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
